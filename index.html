<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI JSON Diff - Compare JSON Objects</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.container{max-width:1400px;margin:0 auto;padding:20px}
h1{text-align:center;font-size:1.8rem;margin-bottom:6px;background:linear-gradient(135deg,#00d2ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{text-align:center;color:#888;font-size:.9rem;margin-bottom:20px}
.input-row{display:flex;gap:16px;margin-bottom:16px}
.input-col{flex:1;display:flex;flex-direction:column}
.input-col label{font-weight:600;margin-bottom:6px;font-size:.95rem;color:#b0b0d0}
textarea{flex:1;min-height:220px;background:#16213e;border:1px solid #333;border-radius:8px;color:#e0e0e0;font-family:'Fira Code','Cascadia Code',monospace;font-size:.85rem;padding:12px;resize:vertical;line-height:1.5;transition:border-color .2s}
textarea:focus{outline:none;border-color:#7b2ff7}
textarea.error{border-color:#ff4757}
.error-msg{color:#ff4757;font-size:.8rem;margin-top:4px;min-height:1.2em}
.btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
button{padding:10px 24px;border:none;border-radius:6px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
button:hover{transform:translateY(-1px)}
.btn-compare{background:linear-gradient(135deg,#7b2ff7,#00d2ff);color:#fff}
.btn-compare:hover{box-shadow:0 4px 15px rgba(123,47,247,.4)}
.btn-s{background:#2d2d5e;color:#b0b0d0;border:1px solid #444}
.btn-s:hover{background:#3d3d6e}
.stats{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.stat{padding:8px 18px;border-radius:6px;font-size:.85rem;font-weight:600;background:#16213e;border:1px solid #333}
.stat-a{color:#2ed573;border-color:#2ed57344}
.stat-r{color:#ff4757;border-color:#ff475744}
.stat-m{color:#ffa502;border-color:#ffa50244}
.stat-t{color:#00d2ff;border-color:#00d2ff44}
.diff-row{display:flex;gap:16px}
.diff-col{flex:1;background:#16213e;border:1px solid #333;border-radius:8px;overflow:auto;max-height:600px}
.diff-col h3{padding:10px 14px;font-size:.85rem;color:#888;border-bottom:1px solid #333;position:sticky;top:0;background:#16213e;z-index:1}
.dc{padding:4px 0;font-family:'Fira Code','Cascadia Code',monospace;font-size:.82rem;white-space:pre;line-height:1.6}
.dl{padding:1px 14px;min-height:1.6em}
.la{background:rgba(46,213,115,.12);color:#2ed573}
.lr{background:rgba(255,71,87,.12);color:#ff4757}
.lm{background:rgba(255,165,2,.12);color:#ffa502}
.lu{color:#999}
.ph{text-align:center;color:#555;padding:40px;font-size:.9rem}
@media(max-width:768px){.input-row,.diff-row{flex-direction:column}textarea{min-height:150px}.container{padding:12px}h1{font-size:1.4rem}}
</style>
</head>
<body>
<div class="container">
<h1>AI JSON Diff</h1>
<p class="subtitle">Deep compare JSON objects &middot; Highlight differences</p>
<div class="input-row">
<div class="input-col">
<label for="jl">Left JSON (Original)</label>
<textarea id="jl" placeholder="Paste or type JSON here..."></textarea>
<div class="error-msg" id="el"></div>
</div>
<div class="input-col">
<label for="jr">Right JSON (Modified)</label>
<textarea id="jr" placeholder="Paste or type JSON here..."></textarea>
<div class="error-msg" id="er"></div>
</div>
</div>
<div class="btn-row">
<button class="btn-compare" onclick="doCompare()">&#9654; Compare</button>
<button class="btn-s" onclick="fmt('jl','el')">Format Left</button>
<button class="btn-s" onclick="fmt('jr','er')">Format Right</button>
<button class="btn-s" onclick="doSwap()">&#8646; Swap</button>
<button class="btn-s" onclick="doClear()">Clear</button>
</div>
<div class="stats" id="stats" style="display:none">
<div class="stat stat-a" id="sa">+ Added: 0</div>
<div class="stat stat-r" id="sr">- Removed: 0</div>
<div class="stat stat-m" id="sm">~ Modified: 0</div>
<div class="stat stat-t" id="st">Total: 0</div>
</div>
<div class="diff-row">
<div class="diff-col"><h3>Left (Original)</h3><div class="dc" id="dl"><div class="ph">Results will appear here after comparing</div></div></div>
<div class="diff-col"><h3>Right (Modified)</h3><div class="dc" id="dr"><div class="ph">Results will appear here after comparing</div></div></div>
</div>
</div>
<script>
var C={a:0,r:0,m:0},LL=[],RL=[];
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function mk(t,c){return{t:t,c:c}}
function pb(t,c){LL.push(mk(t,c));RL.push(mk(t,c))}
function jstr(v){return JSON.stringify(v)}
function indent(n){return '  '.repeat(n)}

function diffObj(a,b,dep){
  var ak=Object.keys(a),bk=Object.keys(b),all=new Set([...ak,...bk]),keys=[...all].sort();
  pb(indent(dep)+'{','lu');
  for(var i=0;i<keys.length;i++){
    var k=keys[i],comma=i<keys.length-1?',':'';
    if(!(k in a)){
      C.a++;
      LL.push(mk(indent(dep+1)+'','lu'));
      RL.push(mk(indent(dep+1)+esc(jstr(k))+': '+esc(jstr(b[k]))+comma,'la'));
    }else if(!(k in b)){
      C.r++;
      LL.push(mk(indent(dep+1)+esc(jstr(k))+': '+esc(jstr(a[k]))+comma,'lr'));
      RL.push(mk(indent(dep+1)+'','lu'));
    }else{
      diffKeyVal(k,a[k],b[k],dep+1,comma);
    }
  }
  pb(indent(dep)+'}','lu');
}

function diffArr(a,b,dep){
  var mx=Math.max(a.length,b.length);
  pb(indent(dep)+'[','lu');
  for(var i=0;i<mx;i++){
    var comma=i<mx-1?',':'';
    if(i>=a.length){
      C.a++;
      LL.push(mk(indent(dep+1)+'','lu'));
      RL.push(mk(indent(dep+1)+esc(jstr(b[i]))+comma,'la'));
    }else if(i>=b.length){
      C.r++;
      LL.push(mk(indent(dep+1)+esc(jstr(a[i]))+comma,'lr'));
      RL.push(mk(indent(dep+1)+'','lu'));
    }else{
      diffVal(a[i],b[i],dep+1,comma);
    }
  }
  pb(indent(dep)+']','lu');
}

function diffKeyVal(k,av,bv,dep,comma){
  var prefix=esc(jstr(k))+': ';
  if(av===null||bv===null||typeof av!==typeof bv||typeof av!=='object'){
    if(av===bv){
      pb(indent(dep)+prefix+esc(jstr(av))+comma,'lu');
    }else{
      C.m++;
      LL.push(mk(indent(dep)+prefix+esc(jstr(av))+comma,'lm'));
      RL.push(mk(indent(dep)+prefix+esc(jstr(bv))+comma,'lm'));
    }
    return;
  }
  if(Array.isArray(av)&&Array.isArray(bv)){
    pb(indent(dep)+prefix+'[','lu');
    var mx=Math.max(av.length,bv.length);
    for(var i=0;i<mx;i++){
      var c2=i<mx-1?',':'';
      if(i>=av.length){C.a++;LL.push(mk(indent(dep+1)+'','lu'));RL.push(mk(indent(dep+1)+esc(jstr(bv[i]))+c2,'la'))}
      else if(i>=bv.length){C.r++;LL.push(mk(indent(dep+1)+esc(jstr(av[i]))+c2,'lr'));RL.push(mk(indent(dep+1)+'','lu'))}
      else{diffVal(av[i],bv[i],dep+1,c2)}
    }
    pb(indent(dep)+']'+comma,'lu');
  }else if(!Array.isArray(av)&&!Array.isArray(bv)){
    pb(indent(dep)+prefix+'{','lu');
    var ak2=Object.keys(av),bk2=Object.keys(bv),all2=new Set([...ak2,...bk2]),ks=[...all2].sort();
    for(var j=0;j<ks.length;j++){
      var k2=ks[j],c3=j<ks.length-1?',':'';
      if(!(k2 in av)){C.a++;LL.push(mk(indent(dep+2)+'','lu'));RL.push(mk(indent(dep+2)+esc(jstr(k2))+': '+esc(jstr(bv[k2]))+c3,'la'))}
      else if(!(k2 in bv)){C.r++;LL.push(mk(indent(dep+2)+esc(jstr(av[k2]))+c3,'lr'));RL.push(mk(indent(dep+2)+'','lu'))}
      else{diffKeyVal(k2,av[k2],bv[k2],dep+2,c3)}
    }
    pb(indent(dep)+'}'+comma,'lu');
  }else{
    C.m++;
    LL.push(mk(indent(dep)+prefix+esc(jstr(av))+comma,'lm'));
    RL.push(mk(indent(dep)+prefix+esc(jstr(bv))+comma,'lm'));
  }
}

function diffVal(a,b,dep,comma){
  if(a===null||b===null||typeof a!==typeof b||typeof a!=='object'){
    if(a===b){pb(indent(dep)+esc(jstr(a))+comma,'lu')}
    else{C.m++;LL.push(mk(indent(dep)+esc(jstr(a))+comma,'lm'));RL.push(mk(indent(dep)+esc(jstr(b))+comma,'lm'))}
    return;
  }
  if(Array.isArray(a)&&Array.isArray(b)){
    pb(indent(dep)+'[','lu');
    var mx=Math.max(a.length,b.length);
    for(var i=0;i<mx;i++){
      var c=i<mx-1?',':'';
      if(i>=a.length){C.a++;LL.push(mk(indent(dep+1)+'','lu'));RL.push(mk(indent(dep+1)+esc(jstr(b[i]))+c,'la'))}
      else if(i>=b.length){C.r++;LL.push(mk(indent(dep+1)+esc(jstr(a[i]))+c,'lr'));RL.push(mk(indent(dep+1)+'','lu'))}
      else{diffVal(a[i],b[i],dep+1,c)}
    }
    pb(indent(dep)+']'+comma,'lu');
  }else if(!Array.isArray(a)&&!Array.isArray(b)){
    pb(indent(dep)+'{','lu');
    var ak=Object.keys(a),bk=Object.keys(b),all=new Set([...ak,...bk]),ks=[...all].sort();
    for(var j=0;j<ks.length;j++){
      var k=ks[j],c2=j<ks.length-1?',':'';
      if(!(k in a)){C.a++;LL.push(mk(indent(dep+1)+'','lu'));RL.push(mk(indent(dep+1)+esc(jstr(k))+': '+esc(jstr(b[k]))+c2,'la'))}
      else if(!(k in b)){C.r++;LL.push(mk(indent(dep+1)+esc(jstr(k))+': '+esc(jstr(a[k]))+c2,'lr'));RL.push(mk(indent(dep+1)+'','lu'))}
      else{diffKeyVal(k,a[k],b[k],dep+1,c2)}
    }
    pb(indent(dep)+'}'+comma,'lu');
  }else{
    C.m++;LL.push(mk(indent(dep)+esc(jstr(a))+comma,'lm'));RL.push(mk(indent(dep)+esc(jstr(b))+comma,'lm'));
  }
}

function render(lines,el){
  el.innerHTML=lines.map(function(l){return '<div class="dl '+l.c+'">'+l.t+'</div>'}).join('');
}

function fmt(tid,eid){
  var ta=document.getElementById(tid),ee=document.getElementById(eid);
  ee.textContent='';ta.classList.remove('error');
  try{
    var v=ta.value.trim();if(!v)return;
    ta.value=JSON.stringify(JSON.parse(v),null,2);
  }catch(e){ee.textContent='Parse error: '+e.message;ta.classList.add('error')}
}

function doSwap(){
  var l=document.getElementById('jl').value,r=document.getElementById('jr').value;
  document.getElementById('jl').value=r;document.getElementById('jr').value=l;
}

function doClear(){
  document.getElementById('jl').value='';document.getElementById('jr').value='';
  document.getElementById('el').textContent='';document.getElementById('er').textContent='';
  document.getElementById('jl').classList.remove('error');document.getElementById('jr').classList.remove('error');
  document.getElementById('dl').innerHTML='<div class="ph">Results will appear here after comparing</div>';
  document.getElementById('dr').innerHTML='<div class="ph">Results will appear here after comparing</div>';
  document.getElementById('stats').style.display='none';
}

function doCompare(){
  var ls=document.getElementById('jl').value,rs=document.getElementById('jr').value;
  document.getElementById('el').textContent='';document.getElementById('er').textContent='';
  document.getElementById('jl').classList.remove('error');document.getElementById('jr').classList.remove('error');
  var lv,rv,ok=true;
  try{if(!ls.trim())throw new Error('Empty input');lv=JSON.parse(ls)}catch(e){document.getElementById('el').textContent='Parse error: '+e.message;document.getElementById('jl').classList.add('error');ok=false}
  try{if(!rs.trim())throw new Error('Empty input');rv=JSON.parse(rs)}catch(e){document.getElementById('er').textContent='Parse error: '+e.message;document.getElementById('jr').classList.add('error');ok=false}
  if(!ok)return;
  C={a:0,r:0,m:0};LL=[];RL=[];
  if(typeof lv==='object'&&lv!==null&&typeof rv==='object'&&rv!==null&&!Array.isArray(lv)&&!Array.isArray(rv)){
    diffObj(lv,rv,0);
  }else if(Array.isArray(lv)&&Array.isArray(rv)){
    diffArr(lv,rv,0);
  }else if(lv===rv){
    pb(esc(jstr(lv)),'lu');
  }else{
    C.m++;LL.push(mk(esc(jstr(lv)),'lm'));RL.push(mk(esc(jstr(rv)),'lm'));
  }
  render(LL,document.getElementById('dl'));
  render(RL,document.getElementById('dr'));
  var tot=C.a+C.r+C.m;
  document.getElementById('sa').textContent='+ Added: '+C.a;
  document.getElementById('sr').textContent='- Removed: '+C.r;
  document.getElementById('sm').textContent='~ Modified: '+C.m;
  document.getElementById('st').textContent='Total: '+tot;
  document.getElementById('stats').style.display='flex';
}
})();
</script>
<script src="https://alwingulla.com/88/tag.min.js" data-zone="130747" async data-cfasync="false"></script>
</body>
</html>
